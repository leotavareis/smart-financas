<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoas | SmartFinanças</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">SmartFinanças</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
            <a href="receitas.html"  class="nav-item">📈 Receitas</a>
            <a href="despesas.html"  class="nav-item">📉 Despesas fixas</a>
            <a href="cartoes.html"   class="nav-item">💳 Cartões</a>
            <a href="faturas.html"   class="nav-item">📄 Importar Faturas</a>
            <a href="parcelamentos.html" class="nav-item">⏳ Parcelamentos</a>
            <a href="relatorios.html"    class="nav-item">📊 Relatórios/Cobrança</a>
            <a href="pessoas.html"   class="nav-item active">👥 Pessoas</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-profile">
                <img id="userPhoto" src="" class="user-avatar" alt="">
                <div class="user-info">
                    <div class="user-name"  id="userName">...</div>
                    <div class="user-email" id="userEmail">...</div>
                </div>
            </div>
            <button class="btn btn-logout" onclick="logout()">Sair</button>
        </div>
    </aside>
    <div id="sidebarOverlay"></div>

    <!-- Conteúdo principal -->
    <main class="main-content">
        <header class="page-header">
            <div class="page-title">
                <button id="hamburger" class="btn btn-ghost">☰</button>
                <h1>Gerenciar Pessoas</h1>
            </div>
            <button class="btn btn-primary" onclick="abrirModalPessoa()">+ Adicionar Pessoa</button>
        </header>

        <div class="stats-grid" id="containerPessoas">
            <p class="empty-state">Carregando…</p>
        </div>
    </main>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" title="Novo lançamento rápido">+</button>

<!-- Modal: Cadastro / Edição de Pessoa -->
<div class="modal-wrapper" id="modalPessoa">
    <div class="modal-overlay"></div>
    <div class="modal-box modal-sm">
        <form id="formPessoa">
            <input type="hidden" id="p-id">
            <div class="modal-header">
                <h3 class="modal-title" id="p-titulo">Adicionar Pessoa</h3>
            </div>
            <div class="modal-body">
                <div class="fl-group">
                    <input type="text" id="p-nome" required>
                    <label>Nome</label>
                </div>
                <div class="fl-group">
                    <input type="color" id="p-cor" style="height:50px;padding:4px;cursor:pointer">
                    <label>Cor de Identificação</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="fecharModal('modalPessoa')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Lançamento Rápido (FAB) -->
<div class="modal-wrapper" id="modalLancamentoRapido">
    <div class="modal-overlay"></div>
    <div class="modal-box">
        <form id="formLancamentoRapido">
            <div class="modal-header"><h3 class="modal-title">Novo Lançamento</h3></div>
            <div class="modal-body">
                <div class="fl-group">
                    <select id="lr-cartao" class="form-control" required></select>
                    <label>Cartão</label>
                </div>
                <div class="fl-group">
                    <input type="text" id="lr-descricao" required>
                    <label>Descrição</label>
                </div>
                <div class="fl-group">
                    <input type="text" id="lr-valor" placeholder="0,00" required>
                    <label>Valor (R$)</label>
                </div>
                <div class="fl-group">
                    <input type="date" id="lr-data" required>
                    <label>Data</label>
                </div>
                <div class="fl-group">
                    <select id="lr-dono" class="form-control"></select>
                    <label>Responsável</label>
                </div>
                <div class="fl-group">
                    <select id="lr-categoria" class="form-control"></select>
                    <label>Categoria</label>
                </div>
                <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.875rem">
                    <input type="checkbox" id="lr-parcelado"> É parcelado?
                </label>
                <div id="lr-campos-parcela" style="display:none;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="fl-group mb-0">
                        <input type="number" id="lr-parcela-atual" value="1" min="1">
                        <label>Parcela Atual</label>
                    </div>
                    <div class="fl-group mb-0">
                        <input type="number" id="lr-total-parcelas" value="1" min="1">
                        <label>Total Parcelas</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="fecharModal('modalLancamentoRapido')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- UI global -->
<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="toastContainer"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
    verificarAuth(async (user) => {
        inicializarAvatar(user);
        document.getElementById('formPessoa').addEventListener('submit', salvarPessoa);
        await carregarPessoas();
    });

    async function carregarPessoas() {
        mostrarLoading(true);
        const container = document.getElementById('containerPessoas');
        try {
            const snap = await colecaoUsuario('pessoas').orderBy('nome').get();
            container.innerHTML = '';

            if (snap.empty) {
                container.innerHTML = '<p class="empty-state">Nenhuma pessoa cadastrada ainda.</p>';
                return;
            }

            snap.forEach(doc => {
                const p        = doc.data();
                const nome     = p.nome || '(sem nome)';
                const iniciais = nome.split(' ').map(s => s[0]).slice(0,2).join('').toUpperCase();
                const cor      = p.cor || '#3b82f6';

                container.innerHTML += `
                    <div class="card" style="display:flex;align-items:center;gap:20px">
                        <div style="width:52px;height:52px;border-radius:50%;background:${cor};
                                    display:flex;align-items:center;justify-content:center;
                                    font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0;
                                    text-shadow:0 1px 3px rgba(0,0,0,.4)">
                            ${iniciais}
                        </div>
                        <div style="flex:1;min-width:0">
                            <div style="font-weight:700;font-size:1rem">${nome}</div>
                            <div class="text-muted small">Membro do rateio</div>
                        </div>
                        <div style="display:flex;gap:6px">
                            <button class="btn btn-sm btn-ghost"
                                onclick='editarPessoa("${doc.id}", ${JSON.stringify(p).replace(/'/g,"&#39;")})'>
                                ✏️
                            </button>
                            <button class="btn btn-sm btn-ghost" onclick="excluirPessoa('${doc.id}')">✕</button>
                        </div>
                    </div>`;
            });

        } catch (err) {
            console.error('[Pessoas] Erro:', err);
            mostrarToast('Erro ao carregar pessoas.', 'erro');
        } finally {
            mostrarLoading(false);
        }
    }

    function abrirModalPessoa() {
        document.getElementById('formPessoa').reset();
        document.getElementById('p-id').value          = '';
        document.getElementById('p-cor').value         = '#3b82f6';
        document.getElementById('p-titulo').textContent = 'Adicionar Pessoa';
        abrirModal('modalPessoa');
        inicializarFloatLabels();
    }

    function editarPessoa(id, dados) {
        document.getElementById('p-id').value          = id;
        document.getElementById('p-nome').value        = dados.nome || '';
        document.getElementById('p-cor').value         = dados.cor  || '#3b82f6';
        document.getElementById('p-titulo').textContent = 'Editar Pessoa';
        abrirModal('modalPessoa');
        inicializarFloatLabels();
    }

    async function salvarPessoa(e) {
        e.preventDefault();
        const id   = document.getElementById('p-id').value;
        const nome = document.getElementById('p-nome').value.trim();
        const cor  = document.getElementById('p-cor').value;

        if (!nome) { mostrarToast('O nome é obrigatório.', 'aviso'); return; }

        mostrarLoading(true);
        try {
            if (id) {
                await colecaoUsuario('pessoas').doc(id).update({ nome, cor });
            } else {
                await colecaoUsuario('pessoas').add({
                    nome,
                    cor,
                    criado_em: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            mostrarToast('Pessoa salva!', 'sucesso');
            fecharModal('modalPessoa');
            await carregarPessoas();
        } catch (err) {
            mostrarToast('Erro ao salvar pessoa.', 'erro');
        } finally {
            mostrarLoading(false);
        }
    }

    async function excluirPessoa(id) {
        confirmarExclusao(
            'Remover esta pessoa? Os lançamentos existentes dela não serão alterados.',
            async () => {
                mostrarLoading(true);
                try {
                    await colecaoUsuario('pessoas').doc(id).delete();
                    mostrarToast('Pessoa removida.', 'sucesso');
                    await carregarPessoas();
                } catch (err) {
                    mostrarToast('Erro ao remover.', 'erro');
                } finally {
                    mostrarLoading(false);
                }
            }
        );
    }
</script>
</body>
</html>
