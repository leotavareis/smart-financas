<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pessoas | FinanÃ§as Pessoais</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">SmartFinanças</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">ðŸ  Dashboard</a>
                <a href="receitas.html" class="nav-item">ðŸ“ˆ Receitas</a>
                <a href="despesas.html" class="nav-item">ðŸ“‰ Despesas fixas</a>
                <a href="cartoes.html" class="nav-item">ðŸ’³ CartÃµes</a>
                <a href="faturas.html" class="nav-item">ðŸ“„ Importar Faturas</a>
                <a href="parcelamentos.html" class="nav-item">â³ Parcelamentos</a>
                <a href="relatorios.html" class="nav-item">ðŸ“Š RelatÃ³rios/CobranÃ§a</a>
                <a href="pessoas.html" class="nav-item active">ðŸ‘¥ Pessoas</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <img id="userPhoto" src="" class="user-avatar" alt="">
                    <div class="user-info">
                        <div class="user-name" id="userName">...</div>
                        <div class="user-email" id="userEmail">...</div>
                    </div>
                </div>
                <button class="btn btn-logout" onclick="logout()">Sair</button>
            </div>
        </aside>
        
        <div id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <button id="hamburger" class="btn btn-ghost">â˜°</button>
                    <h1>Gerenciar Pessoas</h1>
                </div>
                <button class="btn btn-primary" onclick="abrirModalPessoa()">+ Adicionar Pessoa</button>
            </header>

            <div class="stats-grid" id="containerPessoas">
                <!-- JS popula aqui -->
            </div>

            <!-- Modal Pessoa -->
            <div class="modal-wrapper" id="modalPessoa">
                <div class="modal-overlay"></div>
                <div class="modal-box">
                    <form id="formPessoa">
                        <input type="hidden" id="p-id">
                        <div class="modal-header">
                            <h3 class="modal-title" id="p-titulo">Editar Pessoa</h3>
                        </div>
                        <div class="modal-body">
                            <div class="fl-group">
                                <input type="text" id="p-nome" required>
                                <label>Nome</label>
                            </div>
                            <div class="fl-group">
                                <input type="color" id="p-cor" style="height:50px; padding:4px">
                                <label>Cor de IdentificaÃ§Ã£o</label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-ghost" onclick="fecharModal('modalPessoa')">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Salvar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- UI Components -->
    <div id="loadingOverlay"><div class="spinner"></div></div>
    <div id="toastContainer"></div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        verificarAuth(async (user) => {
            inicializarAvatar(user);
            document.getElementById('formPessoa').addEventListener('submit', salvarPessoa);
            await carregarPessoas();
        });

        async function carregarPessoas() {
            mostrarLoading(true);
            const container = document.getElementById('containerPessoas');
            
            try {
                const snap = await colecaoUsuario('pessoas').orderBy('nome').get();
                container.innerHTML = '';

                if (snap.empty) {
                    container.innerHTML = '<p class="empty-state">Nenhuma pessoa cadastrada.</p>';
                    return;
                }

                snap.forEach(doc => {
                    const p = doc.data();
                    const nomeCompleto = p.nome || 'Pessoa s/ nome';
                    const iniciais = nomeCompleto.substring(0, 2).toUpperCase();

                    container.innerHTML += `
                        <div class="card" style="display:flex; align-items:center; gap:20px;">
                            <div style="width:50px; height:50px; border-radius:50%; background:${p.cor}; display:flex; align-items:center; justify-content:center; font-weight:700; color:#000;">
                                ${iniciais}
                            </div>
                            <div style="flex:1">
                                <h3 class="mb-0">${nomeCompleto}</h3>
                                <div class="text-muted small">Membro do rateio</div>
                            </div>
                            <div style="display:flex; gap:8px">
                                <button class="btn btn-sm btn-ghost" onclick="editarPessoa('${doc.id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})">âœŽ</button>
                                <button class="btn btn-sm btn-ghost" onclick="excluirPessoa('${doc.id}')">âœ•</button>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                console.error('[Pessoas] Erro:', err);
                mostrarToast('Erro ao carregar pessoas.', 'erro');
            } finally {
                mostrarLoading(false);
            }
        }

        function abrirModalPessoa() {
            document.getElementById('formPessoa').reset();
            document.getElementById('p-id').value = '';
            document.getElementById('p-titulo').textContent = 'Adicionar Pessoa';
            document.getElementById('p-cor').value = '#3b82f6';
            abrirModal('modalPessoa');
        }

        function editarPessoa(id, dados) {
            document.getElementById('p-id').value = id;
            document.getElementById('p-nome').value = dados.nome;
            document.getElementById('p-cor').value = dados.cor || '#3b82f6';
            document.getElementById('p-titulo').textContent = 'Editar Pessoa';
            
            abrirModal('modalPessoa');
            inicializarFloatLabels();
        }

        async function salvarPessoa(e) {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const nome = document.getElementById('p-nome').value.trim();
            const cor = document.getElementById('p-cor').value;

            if (!nome) {
                mostrarToast('O nome Ã© obrigatÃ³rio.', 'aviso');
                return;
            }

            mostrarLoading(true);
            try {
                if (id) {
                    await colecaoUsuario('pessoas').doc(id).update({ nome, cor });
                } else {
                    await colecaoUsuario('pessoas').add({
                        nome,
                        cor,
                        criado_em: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                mostrarToast('Pessoa salva com sucesso!', 'sucesso');
                fecharModal('modalPessoa');
                await carregarPessoas();
            } catch (err) {
                mostrarToast('Erro ao salvar pessoa.', 'erro');
            } finally {
                mostrarLoading(false);
            }
        }

        async function excluirPessoa(id) {
            confirmarExclusao('Isso removerÃ¡ a pessoa da lista, mas os lanÃ§amentos antigos dela permanecerÃ£o. Continuar?', async () => {
                mostrarLoading(true);
                try {
                    await colecaoUsuario('pessoas').doc(id).delete();
                    mostrarToast('Pessoa removida.', 'sucesso');
                    await carregarPessoas();
                } catch (err) {
                    mostrarToast('Erro ao remover.', 'erro');
                } finally {
                    mostrarLoading(false);
                }
            });
        }
    </script>
</body>
</html>
