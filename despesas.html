    <!-- UI Components -->

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

    <script>
        verificarAuth(async (user) => {
            inicializarAvatar(user);
            inicializarSeletorMes(mes => carregarDespesas(mes));
            
            document.getElementById('formDespesa').addEventListener('submit', salvarDespesa);

            await carregarDespesas(mesSelecionado);
        });

        async function carregarDespesas(mes) {
            mostrarLoading(true);
            const tbody = document.getElementById('tbodyDespesas');
            const totalEl = document.getElementById('totalMesDesp');
            
            try {
                // 1. Buscar todas as despesas fixas ativas
                const snapDesp = await colecaoUsuario('despesas_fixas')
                    .where('ativa', '==', true)
                    .orderBy('dia_vencimento', 'asc')
                    .get();

                // 2. Buscar pagamentos realizados no mÃªs selecionado
                const snapPagos = await colecaoUsuario('despesas_pagas')
                    .where('mes', '==', mes)
                    .get();

                const pagas = Object.fromEntries(
                    snapPagos.docs.map(d => [d.data().despesa_fixa_id, { id: d.id, ...d.data() }])
                );

                let total = 0;
                tbody.innerHTML = '';

                if (snapDesp.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Nenhuma despesa fixa cadastrada.</td></tr>';
                    totalEl.textContent = formatarMoeda(0);
                    return;
                }

                snapDesp.forEach(doc => {
                    const d = doc.data();
                    const pg = pagas[doc.id];
                    total += d.valor;

                    const statusBadge = pg?.pago
                        ? '<span class="badge badge-success">Paga</span>'
                        : '<span class="badge badge-warning">Pendente</span>';

                    const actionBtn = pg?.pago
                        ? `<button class="btn btn-sm btn-ghost" onclick="togglePago('${doc.id}', '${pg.id}', false)">Desmarcar</button>`
                        : `<button class="btn btn-sm btn-outline" onclick="togglePago('${doc.id}', '', true)">Pagar</button>`;

                    tbody.innerHTML += `
                        <tr class="${pg?.pago ? 'item-pago' : ''}">
                            <td class="mono">Dia ${String(d.dia_vencimento).padStart(2,'0')}</td>
                            <td>
                                <div style="font-weight:600">${d.descricao}</div>
                                <div class="text-muted small">${d.categoria}</div>
                            </td>
                            <td>${statusBadge}</td>
                            <td class="mono valor-negativo" style="text-align: right;">${formatarMoeda(d.valor)}</td>
                            <td style="text-align: right;">
                                ${actionBtn}
                                <button class="btn btn-sm btn-ghost" onclick="excluirDespesa('${doc.id}')">Excluir</button>
                            </td>
                        </tr>
                    `;
                });

                totalEl.textContent = formatarMoeda(total);

            } catch (err) {
                console.error('[Despesas] Erro:', err);
                mostrarToast('Erro ao carregar despesas.', 'erro');
            } finally {
                mostrarLoading(false);
            }
        }

        async function salvarDespesa(e) {
            e.preventDefault();
            const desc = document.getElementById('desp-descricao').value.trim();
            const valorStr = document.getElementById('desp-valor').value;
            const venc = parseInt(document.getElementById('desp-vencimento').value);
            const cat = document.getElementById('desp-categoria').value;
            
            const valor = parseFloat(valorStr.replace(',', '.'));

            if (!desc || isNaN(valor) || isNaN(venc) || !cat) {
                mostrarToast('Preencha todos os campos.', 'aviso');
                return;
            }

            mostrarLoading(true);
            try {
                await colecaoUsuario('despesas_fixas').add({
                    descricao: desc,
                    valor,
                    dia_vencimento: venc,
                    categoria: cat,
                    ativa: true,
                    criado_em: firebase.firestore.FieldValue.serverTimestamp()
                });

                mostrarToast('Despesa cadastrada!', 'sucesso');
                document.getElementById('formDespesa').reset();
                await carregarDespesas(mesSelecionado);

            } catch (err) {
                console.error('[Despesas] Erro ao salvar:', err);
                mostrarToast('Erro ao salvar despesa.', 'erro');
            } finally {
                mostrarLoading(false);
            }
        }

        async function togglePago(despesaId, pagamentoId, pago) {
            mostrarLoading(true);
            try {
                if (pago) {
                    // Marcar como pago
                    await colecaoUsuario('despesas_pagas').add({
                        despesa_fixa_id: despesaId,
                        mes: mesSelecionado,
                        pago: true,
                        pago_em: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    mostrarToast('Despesa marcada como paga!', 'sucesso');
                } else {
                    // Desmarcar
                    await colecaoUsuario('despesas_pagas').doc(pagamentoId).delete();
                    mostrarToast('Status alterado para pendente.', 'info');
                }
                await carregarDespesas(mesSelecionado);
            } catch (err) {
                mostrarToast('Erro ao atualizar status.', 'erro');
            } finally {
                mostrarLoading(false);
            }
        }

        async function excluirDespesa(id) {
            confirmarExclusao('Isso desativarÃ¡ esta despesa fixa. Continuar?', async () => {
                mostrarLoading(true);
                try {
                    await colecaoUsuario('despesas_fixas').doc(id).update({ ativa: false });
                    mostrarToast('Despesa fixas desativada.', 'sucesso');
                    await carregarDespesas(mesSelecionado);
                } catch (err) {
                    mostrarToast('Erro ao excluir.', 'erro');
                } finally {
                    mostrarLoading(false);
                }
            });
        }
    </script>
</body>
