<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartões | SmartFinanças</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">SmartFinanças</div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">🏠 Dashboard</a>
            <a href="receitas.html"  class="nav-item">📈 Receitas</a>
            <a href="despesas.html"  class="nav-item">📉 Despesas fixas</a>
            <a href="cartoes.html"   class="nav-item active">💳 Cartões</a>
            <a href="faturas.html"   class="nav-item">📄 Importar Faturas</a>
            <a href="parcelamentos.html" class="nav-item">⏳ Parcelamentos</a>
            <a href="relatorios.html"    class="nav-item">📊 Relatórios/Cobrança</a>
            <a href="pessoas.html"   class="nav-item">👥 Pessoas</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-profile">
                <img id="userPhoto" src="" class="user-avatar" alt="">
                <div class="user-info">
                    <div class="user-name"  id="userName">...</div>
                    <div class="user-email" id="userEmail">...</div>
                </div>
            </div>
            <button class="btn btn-logout" onclick="logout()">Sair</button>
        </div>
    </aside>
    <div id="sidebarOverlay"></div>

    <!-- Conteúdo principal -->
    <main class="main-content">
        <header class="page-header">
            <div class="page-title">
                <button id="hamburger" class="btn btn-ghost">☰</button>
                <h1>Meus Cartões</h1>
            </div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                <button class="btn btn-primary" onclick="abrirNovoCartao()">+ Adicionar Cartão</button>
                <div class="month-selector">
                    <button class="month-nav" id="prevMonth">‹</button>
                    <span id="monthDisplay">...</span>
                    <button class="month-nav" id="nextMonth">›</button>
                </div>
            </div>
        </header>

        <div class="stats-grid" id="containerCartoes">
            <!-- JS popula aqui -->
        </div>
    </main>
</div>

<!-- FAB -->
<button class="fab" id="fabBtn" title="Novo lançamento rápido">+</button>

<!-- Modal: Editar / Novo Cartão -->
<div class="modal-wrapper" id="modalEditarCartao">
    <div class="modal-overlay"></div>
    <div class="modal-box">
        <form id="formEditarCartao">
            <input type="hidden" id="edit-cartao-id">
            <div class="modal-header">
                <h3 class="modal-title" id="modalCartaoTitulo">Editar Cartão</h3>
            </div>
            <div class="modal-body">
                <div class="fl-group">
                    <input type="text" id="edit-cartao-nome" required>
                    <label>Nome do Cartão</label>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                    <div class="fl-group">
                        <input type="number" id="edit-cartao-fechamento" min="1" max="31" required>
                        <label>Dia Fechamento</label>
                    </div>
                    <div class="fl-group">
                        <input type="number" id="edit-cartao-vencimento" min="1" max="31" required>
                        <label>Dia Vencimento</label>
                    </div>
                </div>
                <div class="fl-group">
                    <input type="text" id="edit-cartao-limite" placeholder="0,00">
                    <label>Limite Total (R$)</label>
                </div>
                <div class="fl-group">
                    <input type="color" id="edit-cartao-cor" style="height:50px;padding:4px;cursor:pointer">
                    <label>Cor de Identificação</label>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="fecharModal('modalEditarCartao')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Lançamento Rápido (FAB) -->
<div class="modal-wrapper" id="modalLancamentoRapido">
    <div class="modal-overlay"></div>
    <div class="modal-box">
        <form id="formLancamentoRapido">
            <div class="modal-header">
                <h3 class="modal-title">Novo Lançamento</h3>
            </div>
            <div class="modal-body">
                <div class="fl-group">
                    <select id="lr-cartao" class="form-control" required></select>
                    <label>Cartão</label>
                </div>
                <div class="fl-group">
                    <input type="text" id="lr-descricao" required>
                    <label>Descrição</label>
                </div>
                <div class="fl-group">
                    <input type="text" id="lr-valor" placeholder="0,00" required>
                    <label>Valor (R$)</label>
                </div>
                <div class="fl-group">
                    <input type="date" id="lr-data" required>
                    <label>Data</label>
                </div>
                <div class="fl-group">
                    <select id="lr-dono" class="form-control"></select>
                    <label>Responsável</label>
                </div>
                <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.875rem">
                    <input type="checkbox" id="lr-parcelado"> É parcelado?
                </label>
                <div id="lr-campos-parcela" style="display:none;grid-template-columns:1fr 1fr;gap:12px">
                    <div class="fl-group mb-0">
                        <input type="number" id="lr-parcela-atual" value="1" min="1">
                        <label>Parcela Atual</label>
                    </div>
                    <div class="fl-group mb-0">
                        <input type="number" id="lr-total-parcelas" value="1" min="1">
                        <label>Total Parcelas</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="fecharModal('modalLancamentoRapido')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- UI global -->
<div id="loadingOverlay"><div class="spinner"></div></div>
<div id="toastContainer"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
    verificarAuth(async (user) => {
        inicializarAvatar(user);
        inicializarSeletorMes(mes => carregarCartoes(mes));

        document.getElementById('formEditarCartao').addEventListener('submit', salvarCartao);

        window._recarregarPagina = (mes) => carregarCartoes(mes);

        await carregarCartoes(mesSelecionado);
    });

    async function carregarCartoes(mes) {
        mostrarLoading(true);
        const container = document.getElementById('containerCartoes');
        try {
            const [snapCartoes, snapFaturas] = await Promise.all([
                colecaoUsuario('cartoes').orderBy('nome').get(),
                colecaoUsuario('faturas').where('mes', '==', mes).get()
            ]);

            // Monta mapa cartao_id → fatura do mês
            const faturas = {};
            snapFaturas.forEach(d => { faturas[d.data().cartao_id] = { id: d.id, ...d.data() }; });

            container.innerHTML = '';

            if (snapCartoes.empty) {
                container.innerHTML = '<p class="empty-state">Nenhum cartão. Recarregue a página para inicializar os padrões.</p>';
                return;
            }

            snapCartoes.forEach(doc => {
                const c        = doc.data();
                const f        = faturas[doc.id] || { total: 0, status: 'aberta' };
                const pct      = c.limite > 0 ? Math.min((f.total / c.limite) * 100, 100) : 0;
                const corBarra = pct > 85 ? 'var(--danger)' : pct > 60 ? 'var(--warning)' : 'var(--primary)';

                container.innerHTML += `
                    <div class="card" style="border-left:5px solid ${c.cor}">
                        <div class="flex-between mb-4">
                            <h3 style="color:${c.cor};margin:0">${c.nome}</h3>
                            <button class="btn btn-sm btn-ghost"
                                onclick='abrirEdicaoCartao("${doc.id}", ${JSON.stringify(c).replace(/'/g,"&#39;")})'>
                                ✏️ Editar
                            </button>
                        </div>

                        <div class="stat-label">Fatura ${formatarMes(mes)}</div>
                        <div class="stat-value valor-negativo mb-4">${formatarMoeda(f.total)}</div>

                        <div class="flex-between small text-muted mb-2">
                            <span>Fecha dia ${c.dia_fechamento}</span>
                            <span>Vence dia ${c.dia_vencimento}</span>
                        </div>

                        ${c.limite > 0 ? `
                            <div class="limite-bar-wrap">
                                <div class="limite-bar" style="width:${pct}%;background:${corBarra}"></div>
                            </div>
                            <div class="flex-between small text-muted mt-2">
                                <span>Limite usado: ${pct.toFixed(1)}%</span>
                                <span>${formatarMoeda(c.limite)}</span>
                            </div>
                        ` : `
                            <div class="small text-muted" style="text-align:center;padding-top:8px">
                                Limite não definido
                            </div>
                        `}

                        ${f.total > 0 ? `
                            <button class="btn btn-ghost btn-sm mt-4" style="width:100%"
                                onclick="verLancamentosCartao('${doc.id}','${mes}','${c.nome}')">
                                Ver lançamentos
                            </button>
                        ` : ''}
                    </div>`;
            });

        } catch (err) {
            console.error('[Cartões] Erro:', err);
            mostrarToast('Erro ao carregar cartões.', 'erro');
        } finally {
            mostrarLoading(false);
        }
    }

    function abrirNovoCartao() {
        document.getElementById('edit-cartao-id').value       = '';
        document.getElementById('edit-cartao-nome').value     = '';
        document.getElementById('edit-cartao-fechamento').value = '1';
        document.getElementById('edit-cartao-vencimento').value = '10';
        document.getElementById('edit-cartao-limite').value   = '0';
        document.getElementById('edit-cartao-cor').value      = '#3b82f6';
        document.getElementById('modalCartaoTitulo').textContent = 'Novo Cartão de Crédito';
        abrirModal('modalEditarCartao');
        inicializarFloatLabels();
    }

    function abrirEdicaoCartao(id, dados) {
        document.getElementById('edit-cartao-id').value        = id;
        document.getElementById('edit-cartao-nome').value      = dados.nome;
        document.getElementById('edit-cartao-fechamento').value = dados.dia_fechamento;
        document.getElementById('edit-cartao-vencimento').value = dados.dia_vencimento;
        document.getElementById('edit-cartao-limite').value    = dados.limite || 0;
        document.getElementById('edit-cartao-cor').value       = dados.cor || '#3b82f6';
        document.getElementById('modalCartaoTitulo').textContent = 'Editar Cartão';
        abrirModal('modalEditarCartao');
        inicializarFloatLabels();
    }

    async function salvarCartao(e) {
        e.preventDefault();
        const id    = document.getElementById('edit-cartao-id').value;
        const nome  = document.getElementById('edit-cartao-nome').value.trim();
        const fech  = parseInt(document.getElementById('edit-cartao-fechamento').value);
        const venc  = parseInt(document.getElementById('edit-cartao-vencimento').value);
        const limite = parseFloat(
            document.getElementById('edit-cartao-limite').value.toString().replace(',', '.')
        ) || 0;
        const cor   = document.getElementById('edit-cartao-cor').value;

        if (!nome) { mostrarToast('O nome do cartão é obrigatório.', 'aviso'); return; }

        mostrarLoading(true);
        try {
            const dados = {
                nome,
                dia_fechamento : fech,
                dia_vencimento : venc,
                limite,
                cor,
                atualizado_em  : firebase.firestore.FieldValue.serverTimestamp()
            };
            if (id) {
                await colecaoUsuario('cartoes').doc(id).update(dados);
                mostrarToast('Cartão atualizado!', 'sucesso');
            } else {
                dados.criado_em = firebase.firestore.FieldValue.serverTimestamp();
                await colecaoUsuario('cartoes').add(dados);
                mostrarToast('Cartão adicionado!', 'sucesso');
            }
            fecharModal('modalEditarCartao');
            await carregarCartoes(mesSelecionado);
        } catch (err) {
            console.error('[Cartões] Erro ao salvar:', err);
            mostrarToast('Erro ao salvar.', 'erro');
        } finally {
            mostrarLoading(false);
        }
    }

    // Ver lançamentos de um cartão no mês (abre modal de faturas inline)
    async function verLancamentosCartao(cartaoId, mes, nomeCartao) {
        mostrarLoading(true);
        try {
            const snapFatura = await colecaoUsuario('faturas')
                .where('cartao_id', '==', cartaoId)
                .where('mes', '==', mes)
                .limit(1)
                .get();

            if (snapFatura.empty) {
                mostrarToast('Nenhuma fatura encontrada para este mês.', 'info');
                return;
            }

            const faturaId = snapFatura.docs[0].id;

            // Redireciona para importar faturas com o modal já aberto
            sessionStorage.setItem('abrirFatura', faturaId);
            sessionStorage.setItem('abrirFaturaMes', mes);
            window.location.href = 'faturas.html';
        } catch (err) {
            mostrarToast('Erro ao abrir lançamentos.', 'erro');
        } finally {
            mostrarLoading(false);
        }
    }
</script>
</body>
</html>
