<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Pessoais | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span style="color:var(--primary)">$</span>martFin
            </div>
            <p class="login-desc">Gerencie seus cartões, receitas e cobranças em um só lugar.</p>
            
            <button class="btn btn-google" id="btnGoogleLogin">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa_google_sign_in_button.png" alt="Google" width="18">
                Entrar com Google
            </button>
            
            <div id="loadingOverlay">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Lógica da tela de login
        document.getElementById('btnGoogleLogin').addEventListener('click', loginComGoogle);

        // Se já estiver logado, redireciona para o dashboard
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'dashboard.html';
        });
        
        // Container de Toasts para feedback de erros de login
        document.body.insertAdjacentHTML('beforeend', '<div id="toastContainer"></div>');
    </script>
</body>
</html>
